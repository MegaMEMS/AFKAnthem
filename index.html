<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFK Anthem</title>
  <meta name="description" content="AFK Anthem — official links" />
  <style>
    :root {
      --bg: #0d0d0f;
      --card: #17171b;
      --card-hover: #202028;
      --text: #f2f2f4;
      --muted: #9a9aa6;
      --accent: #e63946;
      --border: #2a2a32;
      --banner-h: 200px;
      --avatar-size: 120px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      padding-bottom: 48px;
    }
    .banner {
      width: 100%;
      height: var(--banner-h);
      background: url('banner.jpg') center/cover no-repeat;
      position: relative;
    }
    .wrap {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px;
      text-align: center;
    }
    .avatar {
      width: var(--avatar-size);
      height: var(--avatar-size);
      border-radius: 50%;
      background: var(--accent);
      border: 4px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: calc(var(--avatar-size) / -2) auto 16px;
      position: relative;
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #fff;
      overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .tagline {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 400px;         /* narrower than the 480px column so it floats centered */
      max-width: 100%;      /* never overflow on small screens */
      margin: 0 auto;       /* center the block */
    }
    a.link {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px 20px;
      color: var(--text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.15s ease, transform 0.12s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    a.link .icon {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: color 0.15s ease, transform 0.15s ease;
    }
    a.link .icon svg { width: 100%; height: 100%; fill: currentColor; }
    a.link .label { flex: 1; text-align: left; }
    a.link .arrow { color: var(--muted); font-size: 18px; transition: transform 0.15s ease, color 0.15s ease; }
 
    a.link:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    }
    a.link:hover .arrow { transform: translateX(4px); color: var(--text); }
    a.link:active { transform: translateY(0); }
 
    /* Per-brand icon colors (always on) */
    a.link.youtube   .icon { color: #ff0000; }
    a.link.spotify   .icon { color: #1db954; }
    a.link.discord   .icon { color: #5865f2; }
    a.link.patreon   .icon { color: #ff424d; }
    a.link.merch     .icon { color: #f5a623; }
    a.link.instagram .icon { color: #e1306c; }
 
    /* Per-brand hover colors */
    .youtube:hover   { border-color: #ff0000; }
    .spotify:hover   { border-color: #1db954; }
    .discord:hover   { border-color: #5865f2; }
    .patreon:hover   { border-color: #ff424d; }
    .merch:hover     { border-color: #f5a623; }
    .instagram:hover { border-color: #e1306c; }
    a.link:hover .icon { transform: scale(1.1); }
 
    .footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: 13px;
    }
 
    @media (max-width: 520px) {
      :root { --banner-h: 150px; --avatar-size: 100px; }
      h1 { font-size: 24px; }
      a.link { padding: 14px 16px; font-size: 15px; }
      .links { width: 100%; }   /* full width on phones, no side gaps */
    }
  </style>
</head>
